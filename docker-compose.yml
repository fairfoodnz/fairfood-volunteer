services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fairfood
    ports:
      - "5434:5432"
    volumes:
      - fairfood-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fairfood"]
      interval: 5s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v1.0.1
    restart: unless-stopped
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # admin API
    environment:
      GARAGE_RPC_SECRET: "1799bccfd7411eddcf9ebd1e0a6c0a0eba18a8f01ed2e5e8d4b3f5d4f9c2bce1"
      GARAGE_ADMIN_TOKEN: "dev-only-admin-token"
      GARAGE_METRICS_TOKEN: "dev-only-metrics-token"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - fairfood-garage-meta:/var/lib/garage/meta
      - fairfood-garage-data:/var/lib/garage/data

volumes:
  fairfood-db:
  fairfood-garage-meta:
  fairfood-garage-data:

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    env:
      # Placeholders so `next build` and `prisma generate` succeed without touching real infra.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fairfood?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      S3_ENDPOINT: http://localhost:3900
      S3_REGION: garage
      S3_BUCKET: fairfood
      S3_ACCESS_KEY_ID: ci-placeholder
      S3_SECRET_ACCESS_KEY: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        # Reads the exact pnpm version from package.json's `packageManager`
        # field — no version pinned here so the two stay in lockstep.

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Build (next build — full TS check)
        run: pnpm run build

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        # Reads the exact pnpm version from package.json's `packageManager`
        # field — no version pinned here so the two stay in lockstep.

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # auth.ts is `server-only` and pulls in db.ts → the generated client
      # must exist for Vitest to resolve `@/generated/prisma`.
      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Unit tests
        run: pnpm run test:unit

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    env:
      # Real Postgres service below; everything else is a CI placeholder.
      # RESEND_API_KEY is intentionally unset — sign-up/booking email sends are
      # best-effort (caught + logged), so the flows still pass.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fairfood?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
      # Build-time-inlined; must match the origin Playwright drives.
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      S3_ENDPOINT: http://localhost:3900
      S3_REGION: garage
      S3_BUCKET: fairfood
      S3_ACCESS_KEY_ID: ci-placeholder
      S3_SECRET_ACCESS_KEY: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fairfood
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fairfood"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        # Reads the exact pnpm version from package.json's `packageManager`
        # field — no version pinned here so the two stay in lockstep.

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed database
        run: pnpm exec prisma db seed

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm run build

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build production image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

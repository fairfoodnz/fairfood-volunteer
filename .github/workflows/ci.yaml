name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    env:
      # Placeholders so `next build` and `prisma generate` succeed without touching real infra.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fairfood?schema=public
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      S3_ENDPOINT: http://localhost:3900
      S3_REGION: garage
      S3_BUCKET: fairfood
      S3_ACCESS_KEY_ID: ci-placeholder
      S3_SECRET_ACCESS_KEY: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build (next build — full TS check)
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
